<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="看板進捗">
<meta name="theme-color" content="#1C2B4A">
<title>看板案件 進捗管理</title>
<style>
:root {
  --navy:#1C2B4A; --navy-light:#2A3F6A;
  --amber:#E8931A; --amber-light:#FDF0DC; --amber-mid:#F5C06A;
  --sage:#4A7C59; --sage-light:#E4F0E8; --sage-mid:#8FBE9F;
  --coral:#D94F4F; --coral-light:#FDEAEA;
  --paper:#F7F5F0; --paper-dark:#EDEAE3;
  --ink:#1A1A1A; --ink-mid:#555; --ink-light:#999;
  --white:#FFFFFF; --border:rgba(0,0,0,0.1);
  --radius:12px; --radius-sm:8px;
  --shadow:0 2px 12px rgba(28,43,74,0.10);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--navy)}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI",sans-serif;font-size:14px;color:var(--ink);background:var(--paper);min-height:100vh;padding-bottom:calc(80px + var(--safe-bottom))}

/* TOPBAR */
.topbar{background:var(--navy);color:var(--white);padding:calc(12px + var(--safe-top)) 16px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.topbar-title{flex:1;font-size:15px;font-weight:600;letter-spacing:.3px}
.sync-pill{background:rgba(255,255,255,.15);border:none;border-radius:20px;color:white;font-size:11px;padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--sage-mid);flex-shrink:0}
.sync-dot.amber{background:var(--amber-mid)}
.sync-dot.red{background:var(--coral)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-dot{animation:pulse 2s infinite}

/* PROJECT TABS */
.project-tabs{background:var(--navy-light);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 12px;scrollbar-width:none}
.project-tabs::-webkit-scrollbar{display:none}
.ptab{flex-shrink:0;padding:10px 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.ptab.active{color:var(--white);border-bottom-color:var(--amber)}
.ptab-add{flex-shrink:0;padding:10px 12px;font-size:20px;color:rgba(255,255,255,.55);border:none;background:none;cursor:pointer}

/* SUMMARY */
.summary{background:var(--navy);padding:14px 16px;color:var(--white)}
.summary-label{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.summary-stats{display:flex;gap:8px;margin-bottom:12px}
.stat{flex:1;background:rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:8px 6px;text-align:center}
.stat-n{font-size:22px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px}
.stat.done .stat-n{color:var(--sage-mid)}
.stat.prog .stat-n{color:var(--amber-mid)}
.stat.wait .stat-n{color:#E8908A}
.stat.total .stat-n{color:var(--white)}
.progress-tape{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px}
.tape-done{background:var(--sage);border-radius:4px 0 0 4px;transition:width .5s}
.tape-prog{background:var(--amber);transition:width .5s}
.tape-wait{flex:1;background:repeating-linear-gradient(-45deg,rgba(255,255,255,.08) 0px,rgba(255,255,255,.08) 3px,rgba(255,255,255,.03) 3px,rgba(255,255,255,.03) 6px);border-radius:0 4px 4px 0}
.pct-label{font-size:11px;color:rgba(255,255,255,.4);text-align:right;margin-top:5px}

/* FILTER */
.filter-bar{display:flex;gap:6px;padding:10px 14px;background:var(--paper-dark);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--ink-mid);cursor:pointer}
.fchip.active{background:var(--navy);color:var(--white);border-color:var(--navy)}

/* CARDS */
.cards{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-header{display:flex;align-items:center;padding:13px 14px;gap:10px;cursor:pointer;user-select:none}
.card-icon{width:36px;height:36px;border-radius:10px;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-location{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-material{font-size:12px;color:var(--ink-mid);margin-top:2px}
.card-sub{font-size:11px;color:var(--ink-light)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.sbadge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.sbadge.done{background:var(--sage-light);color:var(--sage)}
.sbadge.prog{background:var(--amber-light);color:var(--amber)}
.sbadge.wait{background:var(--coral-light);color:var(--coral)}
.card-pct{font-size:10px;color:var(--ink-light)}
.mini-bar{width:50px;height:3px;background:var(--paper-dark);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;background:var(--sage);border-radius:2px;transition:width .3s}
.card-body{display:none;border-top:1px solid var(--paper-dark)}
.card-body.open{display:block}

/* TASKS */
.task-sec{padding:12px 14px}
.task-sec+.task-sec{border-top:1px solid var(--paper-dark)}
.task-sec-head{display:flex;align-items:center;gap:7px;margin-bottom:10px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.task-sec-head.shimoya{color:var(--navy)}
.task-sec-head.efk{color:var(--amber)}
.task-sec-badge{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px}
.task-sec-badge.shimoya{background:var(--navy);color:white}
.task-sec-badge.efk{background:var(--amber);color:white}
.task-rows{display:flex;flex-direction:column;gap:7px}
.task-r{display:flex;align-items:center;gap:8px}
.task-name{font-size:12px;color:var(--ink-mid);width:78px;flex-shrink:0;line-height:1.2}
.task-chip{flex:1;min-height:36px;border-radius:var(--radius-sm);border:1px solid;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;padding:5px 8px;text-align:center;transition:transform .1s;gap:1px}
.task-chip:active{transform:scale(.96)}
.task-chip.done{background:var(--sage-light);border-color:var(--sage-mid)}
.task-chip.wait{background:var(--paper);border-color:var(--border);border-style:dashed}
.tc-icon{font-size:13px;line-height:1}
.tc-date{font-size:10px;font-family:monospace;color:var(--sage);line-height:1}
.tc-empty{font-size:10px;color:var(--ink-light)}

/* NOTE */
.note-sec{padding:10px 14px 12px;border-top:1px solid var(--paper-dark)}
.note-head{font-size:11px;color:var(--ink-light);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.note-edit{font-size:11px;color:var(--navy);background:none;border:none;cursor:pointer;padding:0;font-weight:500}
.note-body{font-size:13px;color:var(--ink)}
.note-empty{font-size:12px;color:var(--ink-light);font-style:italic}
.del-row{padding:0 14px 12px}
.del-btn{font-size:12px;color:var(--coral);background:var(--coral-light);border:1px solid rgba(217,79,79,.2);border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;font-weight:500}

/* FAB */
.fab{position:fixed;bottom:calc(22px + var(--safe-bottom));right:18px;width:56px;height:56px;border-radius:50%;background:var(--amber);color:var(--white);border:none;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,147,26,.4);z-index:200;transition:transform .15s}
.fab:active{transform:scale(.92)}

/* TOAST */
.toast{position:fixed;bottom:calc(90px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--navy);color:white;font-size:12px;padding:8px 18px;border-radius:20px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow)}
.toast.show{opacity:1}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.loading-screen.hidden{display:none}
.loading-logo{font-size:48px}
.loading-text{color:rgba(255,255,255,.7);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--ink-light)}
.empty-icon{font-size:48px;display:block;margin-bottom:12px}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 18px calc(24px + var(--safe-bottom));max-height:90vh;overflow-y:auto;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:40px;height:4px;background:var(--paper-dark);border-radius:2px;margin:0 auto 18px}
.sheet h2{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--navy)}
.sheet h3{font-size:15px;font-weight:600;margin-bottom:4px}
.sheet .sub{font-size:12px;color:var(--ink-mid);margin-bottom:16px}
.flabel{display:block;font-size:12px;font-weight:600;color:var(--ink-mid);margin:14px 0 5px;letter-spacing:.3px}
.flabel:first-of-type{margin-top:0}
.finp{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--ink);background:var(--paper);font-family:inherit}
.finp:focus{outline:none;border-color:var(--navy);background:var(--white)}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--paper);color:var(--ink);font-family:inherit;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--navy);color:var(--white);border-color:var(--navy)}
.btn.danger{background:var(--coral-light);color:var(--coral);border-color:rgba(217,79,79,.3)}
.dopt{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--paper-dark);cursor:pointer;gap:12px}
.dopt:last-child{border-bottom:none}
.dopt:active{background:var(--paper);margin:0 -18px;padding:14px 18px}
.dopt-icon{font-size:20px}
.dopt-label{flex:1;font-size:14px;font-weight:500}
.dopt-check{font-size:18px;color:var(--sage)}
</style>
</head>
<body>

<!-- ローディング画面 -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">🪧</div>
  <div class="spinner"></div>
  <div class="loading-text">データを読み込んでいます...</div>
</div>

<div class="topbar">
  <span style="font-size:18px">🪧</span>
  <span class="topbar-title">看板案件 進捗管理</span>
  <div class="sync-pill">
    <span class="sync-dot" id="sdot"></span>
    <span id="slabel">接続中</span>
  </div>
</div>

<div class="project-tabs" id="projectTabs">
  <button class="ptab-add" onclick="openNewProject()">＋</button>
</div>

<div class="summary" id="summaryEl"></div>

<div class="filter-bar">
  <span class="fchip active" onclick="setFilter('all',this)">すべて</span>
  <span class="fchip" onclick="setFilter('inprog',this)">進行中</span>
  <span class="fchip" onclick="setFilter('waiting',this)">未着手・待ち</span>
  <span class="fchip" onclick="setFilter('done',this)">完了</span>
</div>

<div class="cards" id="cardsEl"></div>
<button class="fab" onclick="openAddRow()">＋</button>
<div class="toast" id="toast"></div>

<!-- 案件追加 -->
<div class="overlay" id="projModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>📁 案件を追加</h2>
    <label class="flabel">案件名 <span style="color:var(--coral)">*</span></label>
    <input class="finp" id="pm_name" placeholder="例：ダイエー三ツ境" />
    <div class="btn-row">
      <button class="btn" onclick="closeProjModal()">キャンセル</button>
      <button class="btn primary" onclick="saveProject()">追加する</button>
    </div>
  </div>
</div>

<!-- 行追加 -->
<div class="overlay" id="rowModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>➕ 行を追加</h2>
    <label class="flabel">案件</label>
    <select class="finp" id="rm_proj"></select>
    <label class="flabel">施工箇所 <span style="color:var(--coral)">*</span></label>
    <input class="finp" id="rm_loc" placeholder="例：テナントサイン、増屋" />
    <label class="flabel">商材</label>
    <input class="finp" id="rm_mat" placeholder="例：アドビューベース、チャンネル文字" />
    <label class="flabel">付帯作業</label>
    <input class="finp" id="rm_sub" placeholder="例：行灯既存架台撤去、ケレン・塗装" />
    <label class="flabel">備考</label>
    <input class="finp" id="rm_note" placeholder="任意" />
    <div class="btn-row">
      <button class="btn" onclick="closeRowModal()">キャンセル</button>
      <button class="btn primary" onclick="saveRow()">追加する</button>
    </div>
  </div>
</div>

<!-- タスク日付 -->
<div class="overlay" id="taskModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="tm_title"></h3>
    <div class="sub" id="tm_sub"></div>
    <div id="tm_opts"></div>
  </div>
</div>

<!-- 備考編集 -->
<div class="overlay" id="noteModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>📝 備考を編集</h2>
    <textarea class="finp" id="note_inp" rows="4" placeholder="備考・メモを入力" style="resize:vertical"></textarea>
    <div class="btn-row">
      <button class="btn" onclick="closeNoteModal()">キャンセル</button>
      <button class="btn primary" onclick="saveNote()">保存</button>
    </div>
  </div>
</div>

<!-- 削除確認 -->
<div class="overlay" id="delModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>🗑️ 削除しますか？</h2>
    <div class="sub" id="del_sub"></div>
    <div class="btn-row">
      <button class="btn" onclick="closeDelModal()">キャンセル</button>
      <button class="btn danger" onclick="confirmDel()">削除する</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDf8nbEMdILOpBeeIJFRLtyWrNi_HyWjRg",
  authDomain: "kanban-1778d.firebaseapp.com",
  databaseURL: "https://kanban-1778d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kanban-1778d",
  storageBucket: "kanban-1778d.firebasestorage.app",
  messagingSenderId: "968181250730",
  appId: "1:968181250730:web:8b05ed7e2bc54f19702ed3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'kanban');

const SHIMOYA_TASKS = [
  {id:'sinput', label:'データ入稿'},
  {id:'sorder', label:'発注'},
  {id:'scheck', label:'検品・確認'},
];
const EFK_TASKS = [
  {id:'emfg',   label:'製作着手'},
  {id:'edeliv', label:'納品・搬入'},
  {id:'einst',  label:'設置・施工'},
  {id:'edone',  label:'施工完了確認'},
];
const ALL_TASKS = [...SHIMOYA_TASKS, ...EFK_TASKS];

let localDB = {};
let currentProject = null;
let currentFilter = 'all';
let noteCtx = null;
let delCtx = null;
let isFirstLoad = true;

/* ── Firebase リアルタイム同期 ── */
setSyncState('connecting');
onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  localDB = data || {};

  if (isFirstLoad) {
    if (Object.keys(localDB).length === 0) {
      initSample();
    } else {
      isFirstLoad = false;
      hideLoading();
      ensureProject();
      renderAll();
      setSyncState('ok');
    }
  } else {
    ensureProject();
    renderAll();
    setSyncState('ok');
    showToast('🔄 データを同期しました');
  }
}, (error) => {
  setSyncState('error');
  hideLoading();
  showToast('⚠️ 接続エラー。再読み込みしてください。');
});

function saveToFirebase() {
  setSyncState('saving');
  set(dbRef, localDB)
    .then(() => setSyncState('ok'))
    .catch(() => setSyncState('error'));
}

function removeFromFirebase(id) {
  setSyncState('saving');
  remove(ref(db, 'kanban/' + id))
    .then(() => setSyncState('ok'))
    .catch(() => setSyncState('error'));
}

/* ── UI helpers ── */
function hideLoading() {
  document.getElementById('loadingScreen').classList.add('hidden');
}
function setSyncState(s) {
  const d = document.getElementById('sdot'), l = document.getElementById('slabel');
  if (s==='connecting') { d.className='sync-dot amber'; l.textContent='接続中'; }
  else if (s==='saving') { d.className='sync-dot amber'; l.textContent='保存中'; }
  else if (s==='ok')     { d.className='sync-dot'; l.textContent='リアルタイム同期'; }
  else                   { d.className='sync-dot red'; l.textContent='エラー'; }
}
function showToast(msg, duration=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}
function genId() { return '_' + Date.now() + Math.random().toString(36).slice(2,6); }
function getProjects() { return [...new Set(Object.values(localDB).map(r => r.project))]; }
function ensureProject() {
  const ps = getProjects();
  if (!currentProject || !ps.includes(currentProject)) currentProject = ps[0] || null;
}
function getRows(proj) { return Object.values(localDB).filter(r => r.project === proj); }
function getStatus(row) {
  const t = row.tasks || {};
  const done = ALL_TASKS.filter(k => t[k.id]?.date).length;
  if (done === ALL_TASKS.length) return 'done';
  if (done > 0) return 'inprog';
  return 'waiting';
}
function getPct(row) {
  const t = row.tasks || {};
  return Math.round(ALL_TASKS.filter(k => t[k.id]?.date).length / ALL_TASKS.length * 100);
}
const sLabel = s => s==='done'?'完了':s==='inprog'?'進行中':'未着手・待ち';

/* ── render ── */
function renderAll() { renderTabs(); renderSummary(); renderCards(); }

function renderTabs() {
  const ps = getProjects();
  const tabs = document.getElementById('projectTabs');
  const add = tabs.querySelector('.ptab-add');
  tabs.querySelectorAll('.ptab').forEach(el => el.remove());
  ps.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'ptab' + (p === currentProject ? ' active' : '');
    btn.textContent = p;
    btn.onclick = () => { currentProject = p; renderAll(); };
    tabs.insertBefore(btn, add);
  });
}

function renderSummary() {
  const el = document.getElementById('summaryEl');
  if (!currentProject) { el.innerHTML = ''; return; }
  const rows = getRows(currentProject);
  const total = rows.length;
  if (total === 0) { el.innerHTML = `<div class="summary-label">${currentProject}</div><div style="font-size:12px;color:rgba(255,255,255,.4)">行がまだありません</div>`; return; }
  const doneN = rows.filter(r => getStatus(r)==='done').length;
  const progN = rows.filter(r => getStatus(r)==='inprog').length;
  const waitN = rows.filter(r => getStatus(r)==='waiting').length;
  const doneP = Math.round(doneN/total*100);
  const progP = Math.round(progN/total*100);
  el.innerHTML = `
    <div class="summary-label">📊 ${currentProject} — 進捗サマリー</div>
    <div class="summary-stats">
      <div class="stat total"><div class="stat-n">${total}</div><div class="stat-l">総行数</div></div>
      <div class="stat done"><div class="stat-n">${doneN}</div><div class="stat-l">完了</div></div>
      <div class="stat prog"><div class="stat-n">${progN}</div><div class="stat-l">進行中</div></div>
      <div class="stat wait"><div class="stat-n">${waitN}</div><div class="stat-l">未着手</div></div>
    </div>
    <div class="progress-tape">
      <div class="tape-done" style="width:${doneP}%"></div>
      <div class="tape-prog" style="width:${progP}%"></div>
      <div class="tape-wait"></div>
    </div>
    <div class="pct-label">完了率 ${doneP}%</div>`;
}

function renderCards() {
  const el = document.getElementById('cardsEl');
  if (!currentProject) { el.innerHTML = '<div class="empty"><span class="empty-icon">📁</span>案件がありません<br>＋ボタンで追加してください</div>'; return; }
  const openSet = new Set([...document.querySelectorAll('.card-body.open')].map(d => d.dataset.id));
  let rows = getRows(currentProject);
  if (currentFilter === 'inprog') rows = rows.filter(r => getStatus(r)==='inprog');
  else if (currentFilter === 'waiting') rows = rows.filter(r => getStatus(r)==='waiting');
  else if (currentFilter === 'done') rows = rows.filter(r => getStatus(r)==='done');
  if (rows.length === 0) { el.innerHTML = '<div class="empty"><span class="empty-icon">🔍</span>該当する行がありません</div>'; return; }
  el.innerHTML = rows.map(r => cardHTML(r, openSet.has(r.id))).join('');
}

function cardHTML(row, open=false) {
  const st = getStatus(row);
  const pct = getPct(row);
  const icons = {done:'🏗️', inprog:'⚙️', waiting:'📋'};
  const mat = row.material ? `<div class="card-material">商材：${row.material}</div>` : '';
  const sub = row.sub ? `<div class="card-sub">付帯：${row.sub}</div>` : '';
  const shimoyaRows = SHIMOYA_TASKS.map(tk => chipHTML(row, tk)).join('');
  const efkRows = EFK_TASKS.map(tk => chipHTML(row, tk)).join('');
  const noteBody = row.note ? `<div class="note-body">${row.note.replace(/\n/g,'<br>')}</div>` : `<div class="note-empty">なし</div>`;
  return `
<div class="card">
  <div class="card-header" onclick="toggleCard('${row.id}')">
    <div class="card-icon">${icons[st]}</div>
    <div class="card-info">
      <div class="card-location">${row.location||'（未設定）'}</div>
      ${mat}${sub}
    </div>
    <div class="card-right">
      <span class="sbadge ${st}">${sLabel(st)}</span>
      <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
      <span class="card-pct">${pct}%</span>
    </div>
  </div>
  <div class="card-body${open?' open':''}" data-id="${row.id}">
    <div class="task-sec">
      <div class="task-sec-head shimoya"><div class="task-sec-badge shimoya">自</div>シモヤタスク</div>
      <div class="task-rows">${shimoyaRows}</div>
    </div>
    <div class="task-sec">
      <div class="task-sec-head efk"><div class="task-sec-badge efk">業</div>エフ広芸タスク</div>
      <div class="task-rows">${efkRows}</div>
    </div>
    <div class="note-sec">
      <div class="note-head">備考・メモ <button class="note-edit" onclick="openNoteModal('${row.id}')">✏️ 編集</button></div>
      ${noteBody}
    </div>
    <div class="del-row">
      <button class="del-btn" onclick="openDelModal('${row.id}')">🗑️ この行を削除</button>
    </div>
  </div>
</div>`;
}

function chipHTML(row, tk) {
  const t = (row.tasks||{})[tk.id];
  const done = t?.date;
  return `
<div class="task-r">
  <span class="task-name">${tk.label}</span>
  <div class="task-chip ${done?'done':'wait'}" onclick="openTaskModal('${row.id}','${tk.id}')">
    <span class="tc-icon">${done?'✅':'⬜'}</span>
    ${done ? `<span class="tc-date">${t.date}</span>` : `<span class="tc-empty">タップして記録</span>`}
  </div>
</div>`;
}

/* ── interactions（グローバルに公開） ── */
window.toggleCard = id => { document.querySelector(`.card-body[data-id="${id}"]`)?.classList.toggle('open'); };
window.setFilter = (f, el) => {
  currentFilter = f;
  document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderCards();
};

window.openNewProject = () => document.getElementById('projModal').classList.add('open');
window.closeProjModal = () => { document.getElementById('projModal').classList.remove('open'); document.getElementById('pm_name').value=''; };
window.saveProject = () => {
  const n = document.getElementById('pm_name').value.trim();
  if (!n) { alert('案件名を入力してください'); return; }
  // 案件名をFirebaseに「プレースホルダー行」として保存し、タブに表示されるようにする
  const id = genId();
  localDB[id] = {
    id, project: n,
    location: '（施工箇所を追加してください）',
    material: '', sub: '', note: '',
    tasks: {}, createdAt: new Date().toISOString(),
    isPlaceholder: true
  };
  currentProject = n;
  saveToFirebase();
  window.closeProjModal();
  renderAll();
  showToast('📁 案件「' + n + '」を追加しました');
};

window.openAddRow = () => {
  const ps = getProjects();
  const sel = document.getElementById('rm_proj');
  sel.innerHTML = ps.length
    ? ps.map(p => `<option value="${p}"${p===currentProject?' selected':''}>${p}</option>`).join('')
    : '<option value="">先に案件を追加してください</option>';
  document.getElementById('rowModal').classList.add('open');
};
window.closeRowModal = () => {
  document.getElementById('rowModal').classList.remove('open');
  ['rm_loc','rm_mat','rm_sub','rm_note'].forEach(i => document.getElementById(i).value='');
};
window.saveRow = () => {
  const project = document.getElementById('rm_proj').value;
  const location = document.getElementById('rm_loc').value.trim();
  if (!project || !location) { alert('施工箇所は必須です'); return; }
  const id = genId();
  localDB[id] = { id, project, location,
    material: document.getElementById('rm_mat').value.trim(),
    sub: document.getElementById('rm_sub').value.trim(),
    note: document.getElementById('rm_note').value.trim(),
    tasks: {}, createdAt: new Date().toISOString() };
  currentProject = project;
  // 同じ案件のプレースホルダー行を削除
  Object.keys(localDB).forEach(k => {
    if (localDB[k].project === project && localDB[k].isPlaceholder) delete localDB[k];
  });
  saveToFirebase();
  window.closeRowModal();
  showToast('✅ 行を追加しました');
};

window.openTaskModal = (rowId, taskId) => {
  const row = localDB[rowId]; if (!row) return;
  const tk = ALL_TASKS.find(t => t.id===taskId);
  const cur = (row.tasks||{})[taskId];
  const today = new Date().toISOString().slice(0,10);
  const has = cur?.date;
  document.getElementById('tm_title').textContent = `${row.location}${row.material?' / '+row.material:''}`;
  document.getElementById('tm_sub').textContent = `タスク：${tk.label}`;
  document.getElementById('tm_opts').innerHTML = `
    <div class="dopt" onclick="setDate('${rowId}','${taskId}','${today}')">
      <span class="dopt-icon">📅</span>
      <span class="dopt-label">今日完了（${today}）</span>
      ${has&&cur.date===today?'<span class="dopt-check">✓</span>':''}
    </div>
    <div style="padding:12px 0;border-bottom:1px solid var(--paper-dark)">
      <div style="font-size:12px;color:var(--ink-light);margin-bottom:6px">日付を指定</div>
      <input type="date" class="finp" id="cdate" value="${has?cur.date:today}" />
      <button class="btn primary" style="width:100%;margin-top:10px" onclick="setDateCustom('${rowId}','${taskId}')">この日付で記録</button>
    </div>
    ${has?`<div class="dopt" onclick="clearDate('${rowId}','${taskId}')">
      <span class="dopt-icon">❌</span><span class="dopt-label" style="color:var(--coral)">記録をクリア</span>
    </div>`:''}
    <div class="dopt" onclick="closeTaskModal()">
      <span class="dopt-icon">←</span><span class="dopt-label">キャンセル</span>
    </div>`;
  document.getElementById('taskModal').classList.add('open');
};
window.setDate = (rowId, taskId, date) => {
  if (!localDB[rowId].tasks) localDB[rowId].tasks = {};
  localDB[rowId].tasks[taskId] = { date, at: new Date().toISOString() };
  saveToFirebase(); window.closeTaskModal();
  showToast('✅ 記録しました');
};
window.setDateCustom = (rowId, taskId) => {
  const d = document.getElementById('cdate').value;
  if (!d) return; window.setDate(rowId, taskId, d);
};
window.clearDate = (rowId, taskId) => {
  if (localDB[rowId].tasks) delete localDB[rowId].tasks[taskId];
  saveToFirebase(); window.closeTaskModal();
  showToast('🗑️ 記録をクリアしました');
};
window.closeTaskModal = () => document.getElementById('taskModal').classList.remove('open');

window.openNoteModal = rowId => { noteCtx=rowId; document.getElementById('note_inp').value=localDB[rowId].note||''; document.getElementById('noteModal').classList.add('open'); };
window.closeNoteModal = () => { document.getElementById('noteModal').classList.remove('open'); noteCtx=null; };
window.saveNote = () => { if(!noteCtx) return; localDB[noteCtx].note=document.getElementById('note_inp').value.trim(); saveToFirebase(); window.closeNoteModal(); showToast('💾 備考を保存しました'); };

window.openDelModal = rowId => { delCtx=rowId; const r=localDB[rowId]; document.getElementById('del_sub').textContent=`${r.location}${r.material?' / '+r.material:''}`; document.getElementById('delModal').classList.add('open'); };
window.closeDelModal = () => { document.getElementById('delModal').classList.remove('open'); delCtx=null; };
window.confirmDel = () => { if(!delCtx) return; removeFromFirebase(delCtx); delete localDB[delCtx]; window.closeDelModal(); showToast('🗑️ 削除しました'); ensureProject(); renderAll(); };

['projModal','rowModal','taskModal','noteModal','delModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) { if(e.target===this) this.classList.remove('open'); });
});
